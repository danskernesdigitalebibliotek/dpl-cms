query GetNode($id: ID!) {
  info {
    name
  }
  node(id: $id) {
    ... on NodeInterface {
      id,
      title,
      url
    }
    ... on NodeArticle {
      canonicalUrl {
        url
      }
      paragraphs {
        ... on ParagraphTextBody {
          body {
            value
            format
          }
        }
        ... on ParagraphAccordion {
          accordionDescription {
            value
            format
          }
          accordionTitle {
            value
            format
          }
        }
      }
    }
  }
}
